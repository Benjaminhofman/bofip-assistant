<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOFiP Assistant</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --chip-bg: #f3f4f6;
      --shadow: 0 1px 3px rgba(0,0,0,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 880px;
      margin: 0 auto;
      width: 100%;
      background: var(--surface);
      box-shadow: 0 0 0 1px var(--border);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-title h1 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .header-title p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 1px;
    }

    #new-conv-btn {
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      background: var(--chip-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    #new-conv-btn:hover { background: var(--border); color: var(--text); }

    /* ── Domain chips ── */
    .domain-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 9px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      align-items: center;
    }

    .domain-bar .label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
      margin-right: 2px;
    }

    .chip {
      padding: 3px 11px;
      font-size: 0.78rem;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--chip-bg);
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
    }
    .chip[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .chip:hover:not([aria-pressed="true"]) { border-color: #9ca3af; color: var(--text); }

    /* ── Conversation ── */
    .conversation {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .empty-state {
      margin: auto;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 40px 20px;
    }
    .empty-state strong {
      display: block;
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* ── Messages ── */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .bubble {
      padding: 11px 15px;
      border-radius: 12px;
      font-size: 0.92rem;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .msg.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-bottom-left-radius: 3px;
      white-space: pre-wrap;
    }

    .msg.assistant.loading .bubble {
      color: var(--muted);
      font-style: italic;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    .loading-dots { animation: blink 1.2s ease-in-out infinite; }

    /* ── Sources ── */
    .sources-panel {
      margin-top: 8px;
      padding: 9px 13px;
      background: #f8faff;
      border: 1px solid #dbeafe;
      border-radius: 8px;
      font-size: 0.8rem;
      width: 100%;
    }

    .sources-panel .sources-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .source-item {
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .source-item a {
      color: var(--accent);
      text-decoration: none;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .source-item a:hover { text-decoration: underline; }

    .source-item .para {
      color: var(--accent);
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
    }

    .source-item .source-titre {
      color: var(--muted);
    }

    /* ── Input area ── */
    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      align-items: flex-end;
      background: var(--surface);
    }

    #input {
      flex: 1;
      padding: 10px 14px;
      font-size: 0.93rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 8px;
      resize: none;
      outline: none;
      line-height: 1.5;
      min-height: 42px;
      max-height: 180px;
      overflow-y: auto;
      transition: border-color 0.15s;
      background: var(--surface);
    }
    #input:focus { border-color: var(--accent); }
    #input:disabled { background: var(--bg); cursor: not-allowed; }
    #input::placeholder { color: #9ca3af; }

    #send-btn {
      padding: 0 18px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      height: 42px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.5; cursor: default; }

    .input-hint {
      font-size: 0.72rem;
      color: #9ca3af;
      margin-top: 5px;
      padding: 0 2px;
    }
  </style>
</head>
<body>
  <div class="app">

    <header>
      <div class="header-title">
        <h1>BOFiP Assistant</h1>
        <p>Doctrine fiscale française — usage professionnel</p>
      </div>
      <button id="new-conv-btn" type="button">Nouvelle conversation</button>
    </header>

    <div class="domain-bar" id="domain-bar">
      <span class="label">Domaine&nbsp;:</span>
    </div>

    <div class="conversation" id="conversation">
      <div class="empty-state" id="empty-state">
        <strong>Posez votre question fiscale</strong>
        L'assistant consulte la doctrine BOFiP en temps réel et vous guide<br>
        à travers des questions de clarification avant de synthétiser.
      </div>
    </div>

    <div class="input-wrapper" style="flex-shrink:0">
      <div class="input-area">
        <textarea
          id="input"
          placeholder="Votre question fiscale… (Entrée pour envoyer, Maj+Entrée pour sauter une ligne)"
          rows="1"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
        <button id="send-btn" type="button">Envoyer</button>
      </div>
    </div>

  </div>

  <script>
    const DOMAINES = ["IS", "IR", "TVA", "BIC", "BNC", "RPPM", "ENR", "PAT"];

    // ── État ──
    let messages = [];
    let panier_boi = new Set();   // boi_id accumulés (pistes cadrage + cités synthèse)
    let filtre_domaine = null;
    let isLoading = false;

    // ── Refs DOM ──
    const domainBarEl  = document.getElementById("domain-bar");
    const convEl       = document.getElementById("conversation");
    const emptyStateEl = document.getElementById("empty-state");
    const inputEl      = document.getElementById("input");
    const sendBtn      = document.getElementById("send-btn");
    const newConvBtn   = document.getElementById("new-conv-btn");

    // ── Puces de domaine ──
    DOMAINES.forEach((dom) => {
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = "chip";
      chip.textContent = dom;
      chip.setAttribute("aria-pressed", "false");
      chip.addEventListener("click", () => {
        const wasActive = filtre_domaine === dom;
        domainBarEl.querySelectorAll(".chip").forEach((c) => c.setAttribute("aria-pressed", "false"));
        filtre_domaine = wasActive ? null : dom;
        if (!wasActive) chip.setAttribute("aria-pressed", "true");
      });
      domainBarEl.appendChild(chip);
    });

    // ── Textarea auto-resize ──
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + "px";
    });

    // ── Entrée pour envoyer ──
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (!isLoading) sendMessage();
      }
    });

    sendBtn.addEventListener("click", () => { if (!isLoading) sendMessage(); });

    // ── Nouvelle conversation ──
    newConvBtn.addEventListener("click", () => {
      messages = [];
      panier_boi = new Set();
      convEl.innerHTML = "";
      convEl.appendChild(emptyStateEl);
      emptyStateEl.style.display = "";
      inputEl.value = "";
      inputEl.style.height = "auto";
      inputEl.focus();
    });

    // ── Utilitaires ──
    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function scrollToBottom() {
      convEl.scrollTop = convEl.scrollHeight;
    }

    // ── Affiche une bulle ──
    function appendBubble(role, content, sources) {
      emptyStateEl.style.display = "none";

      const msgDiv = document.createElement("div");
      msgDiv.className = `msg ${role}`;

      const label = document.createElement("div");
      label.className = "msg-label";
      label.textContent = role === "user" ? "Vous" : "Assistant";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      // Texte brut escapé, retours à la ligne conservés via white-space:pre-wrap
      bubble.textContent = content;

      msgDiv.appendChild(label);
      msgDiv.appendChild(bubble);

      // Sources (phase synthèse uniquement)
      if (sources && sources.length) {
        const panel = document.createElement("div");
        panel.className = "sources-panel";

        const lbl = document.createElement("div");
        lbl.className = "sources-label";
        lbl.textContent = "Sources citées";
        panel.appendChild(lbl);

        sources.forEach((b) => {
          const item = document.createElement("div");
          item.className = "source-item";

          const a = document.createElement("a");
          a.href = b.url_bofip || "#";
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.textContent = b.boi_id || "";

          item.appendChild(a);

          if (b.paragraphe) {
            const para = document.createElement("span");
            para.className = "para";
            para.textContent = " " + b.paragraphe;
            item.appendChild(para);
          }

          if (b.titre) {
            const titre = document.createElement("span");
            titre.className = "source-titre";
            titre.textContent = " — " + b.titre;
            item.appendChild(titre);
          }

          panel.appendChild(item);
        });

        msgDiv.appendChild(panel);
      }

      convEl.appendChild(msgDiv);
      scrollToBottom();
      return msgDiv;
    }

    // ── Indicateur de chargement ──
    let loadingEl = null;

    function showLoading() {
      loadingEl = document.createElement("div");
      loadingEl.className = "msg assistant loading";

      const label = document.createElement("div");
      label.className = "msg-label";
      label.textContent = "Assistant";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const dots = document.createElement("span");
      dots.className = "loading-dots";
      dots.textContent = "Recherche dans le BOFiP…";

      bubble.appendChild(dots);
      loadingEl.appendChild(label);
      loadingEl.appendChild(bubble);

      convEl.appendChild(loadingEl);
      scrollToBottom();
    }

    function hideLoading() {
      if (loadingEl) { loadingEl.remove(); loadingEl = null; }
    }

    // ── Envoi ──
    async function sendMessage() {
      const content = inputEl.value.trim();
      if (!content) return;

      // Ajoute le message utilisateur à l'historique et l'affiche
      messages.push({ role: "user", content });
      appendBubble("user", content);

      // Réinitialise la saisie
      inputEl.value = "";
      inputEl.style.height = "auto";

      // État de chargement
      isLoading = true;
      sendBtn.disabled = true;
      inputEl.disabled = true;
      showLoading();

      try {
        const resp = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages,
            paniers_boi: [...panier_boi],
            filtre_domaine,
          }),
        });

        const data = await resp.json();
        hideLoading();

        if (!resp.ok || data.error) {
          throw new Error(data.error || `HTTP ${resp.status}`);
        }

        const reponse = data.reponse || "";

        // Mise à jour du panier
        if (data.phase === "cadrage" && Array.isArray(data.boi_pistes)) {
          data.boi_pistes.forEach((b) => { if (b.boi_id) panier_boi.add(b.boi_id); });
        }
        if (data.phase === "synthese" && Array.isArray(data.boi_cites)) {
          data.boi_cites.forEach((b) => { if (b.boi_id) panier_boi.add(b.boi_id); });
        }

        // Ajoute la réponse à l'historique
        messages.push({ role: "assistant", content: reponse });

        // Affiche la bulle avec sources si synthèse
        const sources = data.phase === "synthese" ? (data.boi_cites || []) : null;
        appendBubble("assistant", reponse, sources);

      } catch (err) {
        hideLoading();
        // Retire le dernier message utilisateur de l'historique pour permettre un retry propre
        messages.pop();
        appendBubble("assistant", `Une erreur est survenue : ${err.message}`);
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
