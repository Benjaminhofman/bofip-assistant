<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOFiP Assistant</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --chip-bg: #f3f4f6;
      --shadow: 0 1px 3px rgba(0,0,0,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 880px;
      margin: 0 auto;
      width: 100%;
      background: var(--surface);
      box-shadow: 0 0 0 1px var(--border);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-title h1 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .header-title p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .header-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .btn-ghost {
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      background: var(--chip-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .btn-ghost:hover { background: var(--border); color: var(--text); }
    .btn-ghost:disabled { opacity: 0.4; cursor: default; }

    /* ── Domain chips ── */
    .domain-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 9px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      align-items: center;
    }
    .domain-bar .label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
      margin-right: 2px;
    }
    .chip {
      padding: 3px 11px;
      font-size: 0.78rem;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--chip-bg);
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
    }
    .chip[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .chip:hover:not([aria-pressed="true"]) { border-color: #9ca3af; color: var(--text); }

    /* ── Conversation ── */
    .conversation {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .empty-state {
      margin: auto;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 40px 20px;
    }
    .empty-state strong {
      display: block;
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* ── Messages ── */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }
    .msg.user    { align-self: flex-end;   align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .bubble {
      padding: 11px 15px;
      border-radius: 12px;
      font-size: 0.92rem;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 3px;
      white-space: pre-wrap;
    }
    .msg.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-bottom-left-radius: 3px;
    }
    .msg.assistant.loading .bubble {
      color: var(--muted);
      font-style: italic;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.35; } }
    .loading-dots { animation: blink 1.2s ease-in-out infinite; }

    /* ── Liens BOI dans le texte ── */
    .boi-link {
      color: var(--accent);
      text-decoration: none;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: .88em;
      font-weight: 600;
      border-bottom: 1px dotted var(--accent);
    }
    .boi-link:hover { text-decoration: underline; }

    .boi-ignore {
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: .88em;
      color: #9ca3af;
    }

    /* ── Encart Sources (synthèse) ── */
    .sources-panel {
      margin-top: 8px;
      padding: 10px 14px;
      background: #f8faff;
      border: 1px solid #dbeafe;
      border-radius: 8px;
      font-size: 0.81rem;
      width: 100%;
    }
    .encart-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      margin-bottom: 7px;
    }
    .source-item {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 5px;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .source-item:last-child { margin-bottom: 0; }
    .source-item a {
      color: var(--accent);
      text-decoration: none;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .source-item a:hover { text-decoration: underline; }
    .source-titre { color: var(--muted); }
    .source-date  { color: #9ca3af; font-size: 0.75rem; }

    /* Badges statut */
    .badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-ok     { background: #dcfce7; color: #166534; }
    .badge-warn   { background: #fef9c3; color: #854d0e; }
    .badge-orange { background: #ffedd5; color: #9a3412; }
    .badge-red    { background: #fee2e2; color: #991b1b; }
    .badge-gray   { background: #f3f4f6; color: #6b7280; }

    /* ── Encart Base légale ── */
    .cgi-panel {
      margin-top: 8px;
      padding: 9px 14px;
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.81rem;
      width: 100%;
      color: var(--muted);
    }
    .cgi-panel .encart-label { color: var(--muted); }
    .cgi-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .cgi-item {
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 0.78rem;
      background: var(--chip-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 7px;
      color: var(--text);
    }

    /* ── Message d'erreur ── */
    .msg.error .bubble {
      background: #fff7f7;
      border-color: #fecaca;
      color: #7f1d1d;
      font-size: 0.85rem;
    }
    .msg.error .msg-label { color: #f87171; }

    /* ── Zone de saisie ── */
    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      align-items: flex-end;
      background: var(--surface);
    }
    #input {
      flex: 1;
      padding: 10px 14px;
      font-size: 0.93rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 8px;
      resize: none;
      outline: none;
      line-height: 1.5;
      min-height: 42px;
      max-height: 180px;
      overflow-y: auto;
      transition: border-color 0.15s;
      background: var(--surface);
    }
    #input:focus { border-color: var(--accent); }
    #input:disabled { background: var(--bg); cursor: not-allowed; }
    #input::placeholder { color: #9ca3af; }
    #send-btn {
      padding: 0 18px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      height: 42px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div class="app">

    <header>
      <div class="header-title">
        <h1>BOFiP Assistant</h1>
        <p>Doctrine fiscale française — usage professionnel</p>
      </div>
      <div class="header-actions">
        <button id="export-btn" class="btn-ghost" type="button" disabled>Exporter</button>
        <button id="new-conv-btn" class="btn-ghost" type="button">Nouvelle conversation</button>
      </div>
    </header>

    <div class="domain-bar" id="domain-bar">
      <span class="label">Domaine&nbsp;:</span>
    </div>

    <div class="conversation" id="conversation">
      <div class="empty-state" id="empty-state">
        <strong>Posez votre question fiscale</strong>
        L'assistant consulte la doctrine BOFiP en temps réel et vous guide<br>
        à travers des questions de clarification avant de synthétiser.
      </div>
    </div>

    <div class="input-area">
      <textarea
        id="input"
        placeholder="Votre question fiscale… (Entrée pour envoyer, Maj+Entrée pour sauter une ligne)"
        rows="1"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="send-btn" type="button">Envoyer</button>
    </div>

  </div>

  <script>
    const DOMAINES = ["IS", "IR", "TVA", "BIC", "BNC", "RPPM", "ENR", "PAT"];

    // ── État ──────────────────────────────────────────────────────────────
    let messages          = [];
    let panier_boi        = new Set();      // boi_id accumulés (pistes + cités)
    let boi_cites_cumules = new Map();      // boi_id → entrée complète (pour export)
    let filtre_domaine    = null;
    let isLoading         = false;

    // ── Refs DOM ──────────────────────────────────────────────────────────
    const domainBarEl  = document.getElementById("domain-bar");
    const convEl       = document.getElementById("conversation");
    const emptyStateEl = document.getElementById("empty-state");
    const inputEl      = document.getElementById("input");
    const sendBtn      = document.getElementById("send-btn");
    const newConvBtn   = document.getElementById("new-conv-btn");
    const exportBtn    = document.getElementById("export-btn");

    // ── Puces de domaine ──────────────────────────────────────────────────
    DOMAINES.forEach((dom) => {
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = "chip";
      chip.textContent = dom;
      chip.setAttribute("aria-pressed", "false");
      chip.addEventListener("click", () => {
        const wasActive = filtre_domaine === dom;
        domainBarEl.querySelectorAll(".chip")
          .forEach((c) => c.setAttribute("aria-pressed", "false"));
        filtre_domaine = wasActive ? null : dom;
        if (!wasActive) chip.setAttribute("aria-pressed", "true");
      });
      domainBarEl.appendChild(chip);
    });

    // ── Textarea auto-resize ──────────────────────────────────────────────
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + "px";
    });

    // ── Entrée = envoyer, Maj+Entrée = saut de ligne ──────────────────────
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (!isLoading) sendMessage();
      }
    });
    sendBtn.addEventListener("click", () => { if (!isLoading) sendMessage(); });

    // ── Nouvelle conversation ─────────────────────────────────────────────
    newConvBtn.addEventListener("click", () => {
      messages          = [];
      panier_boi        = new Set();
      boi_cites_cumules = new Map();
      convEl.innerHTML  = "";
      convEl.appendChild(emptyStateEl);
      emptyStateEl.style.display = "";
      inputEl.value      = "";
      inputEl.style.height = "auto";
      exportBtn.disabled = true;
      inputEl.focus();
    });

    // ── Export ────────────────────────────────────────────────────────────
    exportBtn.addEventListener("click", async () => {
      try {
        const resp = await fetch("/export", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages,
            boi_cites_cumules: [...boi_cites_cumules.values()],
          }),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const html = await resp.text();
        const blob = new Blob([html], { type: "text/html; charset=utf-8" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        const date = new Date().toISOString().slice(0, 10);
        a.href     = url;
        a.download = `bofip-consultation-${date}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (err) {
        appendError(`Erreur lors de l'export : ${err.message}`);
      }
    });

    // ── Utilitaires ───────────────────────────────────────────────────────
    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function scrollToBottom() { convEl.scrollTop = convEl.scrollHeight; }

    // ── Rendu du texte avec liens BOI ─────────────────────────────────────
    // citesMap  : Map boi_id → { url_bofip, ... }
    // ignoresSet: Set boi_id (cités hors contexte)
    function renderTextWithBoi(text, citesMap, ignoresSet) {
      const regex = /\[BOI-[A-Z0-9][A-Z0-9-]*(?:\s+§\s*[\d.]+)?\]/g;
      let html = "";
      let last = 0;
      let m;

      while ((m = regex.exec(text)) !== null) {
        // Texte avant la citation
        html += escapeHtml(text.slice(last, m.index)).replace(/\n/g, "<br>");

        const full  = m[0];                       // "[BOI-TVA-BASE-10 § 50]"
        const inner = full.slice(1, -1);           // "BOI-TVA-BASE-10 § 50"
        const pm    = inner.match(/^(BOI-[A-Z0-9-]+)\s+§\s*([\d.]+)$/);
        const boiId = pm ? pm[1] : inner.trim();
        const para  = pm ? pm[2] : null;

        if (citesMap && citesMap.has(boiId)) {
          let href = citesMap.get(boiId).url_bofip || "#";
          // Tente d'ajouter l'ancre de paragraphe si l'URL ne l'a pas déjà
          if (para && href !== "#" && !href.includes("#")) href += "#" + para;
          html += `<a class="boi-link" href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${escapeHtml(inner)}</a>`;
        } else if (ignoresSet && ignoresSet.has(boiId)) {
          html += `<span class="boi-ignore">${escapeHtml(inner)}</span>`;
        } else {
          html += escapeHtml(full);
        }

        last = m.index + full.length;
      }

      html += escapeHtml(text.slice(last)).replace(/\n/g, "<br>");
      return html;
    }

    // ── Badge statut de version ───────────────────────────────────────────
    function badgeStatut(note_version) {
      if (!note_version) return "";
      const m    = note_version.match(/statut "([^"]+)"/);
      const st   = m ? m[1].toLowerCase() : "";
      const plus = note_version.includes("plus récente disponible");

      if (st.includes("vigueur") && !plus)
        return '<span class="badge badge-ok">En vigueur</span>';
      if (st.includes("vigueur") && plus)
        return '<span class="badge badge-warn">Mise à jour</span>';
      if (st.includes("rapport"))
        return '<span class="badge badge-orange">Rapporté</span>';
      if (st.includes("abrog"))
        return '<span class="badge badge-red">Abrogé</span>';
      return st ? `<span class="badge badge-gray">${escapeHtml(st)}</span>` : "";
    }

    // ── Affiche une bulle utilisateur ─────────────────────────────────────
    function appendUserBubble(content) {
      emptyStateEl.style.display = "none";
      const msgDiv = document.createElement("div");
      msgDiv.className = "msg user";
      const label = document.createElement("div");
      label.className = "msg-label";
      label.textContent = "Vous";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = content;      // pre-wrap CSS gère les sauts de ligne
      msgDiv.appendChild(label);
      msgDiv.appendChild(bubble);
      convEl.appendChild(msgDiv);
      scrollToBottom();
    }

    // ── Affiche une bulle assistant ───────────────────────────────────────
    // meta : { boi_cites?, boi_ignores?, articles_cgi? }
    function appendAssistantBubble(content, meta = {}) {
      emptyStateEl.style.display = "none";
      const { boi_cites = [], boi_ignores = [], articles_cgi = [] } = meta;

      const citesMap   = new Map(boi_cites.map((b) => [b.boi_id, b]));
      const ignoresSet = new Set(boi_ignores.map((b) => b.boi_id));
      const hasMeta    = boi_cites.length > 0 || boi_ignores.length > 0;

      const msgDiv = document.createElement("div");
      msgDiv.className = "msg assistant";

      const label = document.createElement("div");
      label.className = "msg-label";
      label.textContent = "Assistant";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      // Rendu avec liens BOI si on a des métadonnées, sinon texte simple
      if (hasMeta) {
        bubble.innerHTML = renderTextWithBoi(content, citesMap, ignoresSet);
      } else {
        // Cadrage : pas de citations, juste newlines
        bubble.innerHTML = escapeHtml(content).replace(/\n/g, "<br>");
      }

      msgDiv.appendChild(label);
      msgDiv.appendChild(bubble);

      // Encart Sources
      if (boi_cites.length) {
        const panel = document.createElement("div");
        panel.className = "sources-panel";

        const lbl = document.createElement("div");
        lbl.className = "encart-label";
        lbl.textContent = "Sources citées";
        panel.appendChild(lbl);

        boi_cites.forEach((b) => {
          const item = document.createElement("div");
          item.className = "source-item";

          const a = document.createElement("a");
          a.href   = b.url_bofip || "#";
          a.target = "_blank";
          a.rel    = "noopener noreferrer";
          a.textContent = b.boi_id || "";
          item.appendChild(a);

          if (b.paragraphe) {
            const para = document.createElement("span");
            para.className = "source-titre";
            para.textContent = " " + b.paragraphe;
            item.appendChild(para);
          }

          if (b.titre) {
            const t = document.createElement("span");
            t.className = "source-titre";
            t.textContent = " — " + b.titre;
            item.appendChild(t);
          }

          if (b.date_publication) {
            const d = document.createElement("span");
            d.className = "source-date";
            d.textContent = " (" + b.date_publication + ")";
            item.appendChild(d);
          }

          if (b.note_version) {
            const badge = document.createElement("span");
            badge.innerHTML = " " + badgeStatut(b.note_version);
            item.appendChild(badge);
          }

          panel.appendChild(item);
        });

        msgDiv.appendChild(panel);
      }

      // Encart Base légale
      if (articles_cgi.length) {
        const cgiPanel = document.createElement("div");
        cgiPanel.className = "cgi-panel";

        const cgiLbl = document.createElement("div");
        cgiLbl.className = "encart-label";
        cgiLbl.textContent = "Base légale référencée (CGI)";
        cgiPanel.appendChild(cgiLbl);

        const list = document.createElement("div");
        list.className = "cgi-list";
        articles_cgi.forEach((art) => {
          const span = document.createElement("span");
          span.className = "cgi-item";
          span.textContent = "Art. " + art + " CGI";
          list.appendChild(span);
        });
        cgiPanel.appendChild(list);
        msgDiv.appendChild(cgiPanel);
      }

      convEl.appendChild(msgDiv);
      scrollToBottom();
    }

    // ── Affiche un message d'erreur discret ───────────────────────────────
    function appendError(message) {
      emptyStateEl.style.display = "none";
      const msgDiv = document.createElement("div");
      msgDiv.className = "msg assistant error";
      const label = document.createElement("div");
      label.className = "msg-label";
      label.textContent = "Erreur";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = message;
      msgDiv.appendChild(label);
      msgDiv.appendChild(bubble);
      convEl.appendChild(msgDiv);
      scrollToBottom();
    }

    // ── Indicateur de chargement ──────────────────────────────────────────
    let loadingEl = null;

    function showLoading() {
      loadingEl = document.createElement("div");
      loadingEl.className = "msg assistant loading";
      const label = document.createElement("div");
      label.className = "msg-label";
      label.textContent = "Assistant";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      const dots = document.createElement("span");
      dots.className = "loading-dots";
      dots.textContent = "Recherche dans le BOFiP…";
      bubble.appendChild(dots);
      loadingEl.appendChild(label);
      loadingEl.appendChild(bubble);
      convEl.appendChild(loadingEl);
      scrollToBottom();
    }

    function hideLoading() {
      if (loadingEl) { loadingEl.remove(); loadingEl = null; }
    }

    // ── Envoi ─────────────────────────────────────────────────────────────
    async function sendMessage() {
      const content = inputEl.value.trim();
      if (!content) return;

      messages.push({ role: "user", content });
      appendUserBubble(content);

      inputEl.value = "";
      inputEl.style.height = "auto";

      isLoading = true;
      sendBtn.disabled = true;
      inputEl.disabled = true;
      showLoading();

      try {
        const resp = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages,
            paniers_boi: [...panier_boi],
            filtre_domaine,
          }),
        });

        const data = await resp.json();
        hideLoading();

        if (!resp.ok || data.error) throw new Error(data.error || `HTTP ${resp.status}`);

        const reponse = data.reponse || "";

        // Mise à jour du panier
        if (data.phase === "cadrage" && Array.isArray(data.boi_pistes)) {
          data.boi_pistes.forEach((b) => { if (b.boi_id) panier_boi.add(b.boi_id); });
        }
        if (data.phase === "synthese" && Array.isArray(data.boi_cites)) {
          data.boi_cites.forEach((b) => {
            if (b.boi_id) {
              panier_boi.add(b.boi_id);
              // Accumule pour l'export (première occurrence gagne)
              if (!boi_cites_cumules.has(b.boi_id)) boi_cites_cumules.set(b.boi_id, b);
            }
          });
          exportBtn.disabled = false;
        }

        messages.push({ role: "assistant", content: reponse });

        if (data.phase === "synthese") {
          appendAssistantBubble(reponse, {
            boi_cites:   data.boi_cites   || [],
            boi_ignores: data.boi_ignores || [],
            articles_cgi: data.articles_cgi || [],
          });
        } else {
          appendAssistantBubble(reponse);
        }

      } catch (err) {
        hideLoading();
        // Retire le message utilisateur de l'historique pour permettre un retry propre
        messages.pop();
        appendError(`Une erreur est survenue : ${err.message}`);
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
