<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot BOFiP</title>
  <style>
    :root {
      --accent:        #1a3a2e;
      --accent-hover:  #2d5a45;
      --accent-light:  #e8f0ea;
      --bg:            #f7f7f5;
      --surface:       #ffffff;
      --border:        #e0e0e0;
      --text:          #1a1a1a;
      --muted:         #6b7280;
      --shadow:        0 1px 3px rgba(0,0,0,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 880px;
      margin: 0 auto;
      width: 100%;
      background: var(--surface);
      box-shadow: 0 0 0 1px var(--border);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 24px;
      background: linear-gradient(135deg, #1a3a2e 0%, #2d5a45 100%);
      flex-shrink: 0;
    }

    .header-title h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.01em;
    }
    .header-title p {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.65);
      margin-top: 2px;
    }

    .header-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* Bouton secondaire (Exporter, Nouvelle conversation) */
    .btn-secondary {
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 500;
      color: #ffffff;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.7);
    }
    .btn-secondary:disabled { opacity: 0.35; cursor: default; }

    /* ── Barre de domaines ── */
    .domain-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 9px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      align-items: center;
      background: var(--surface);
    }
    .domain-bar .label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
      margin-right: 2px;
    }
    .chip {
      padding: 3px 12px;
      font-size: 0.78rem;
      font-weight: 500;
      border: 1px solid #c5d9cc;
      border-radius: 999px;
      background: var(--accent-light);
      color: var(--accent);
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
    }
    .chip[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }
    .chip:hover:not([aria-pressed="true"]) {
      background: #d4e7d9;
      border-color: #aac7b4;
    }

    /* ── Zone de conversation ── */
    .conversation {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
      background: var(--bg);
    }

    .empty-state {
      margin: auto;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 40px 20px;
    }
    .empty-state strong {
      display: block;
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* ── Messages ── */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }
    .msg.user      { align-self: flex-end;   align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .bubble {
      padding: 11px 15px;
      border-radius: 12px;
      font-size: 0.92rem;
      word-break: break-word;
    }

    /* Bulle utilisateur : vert clair */
    .msg.user .bubble {
      background: var(--accent-light);
      color: var(--accent);
      border-bottom-right-radius: 3px;
      white-space: pre-wrap;
      border: 1px solid #c5d9cc;
    }

    /* Bulle assistant : blanc bordé */
    .msg.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-bottom-left-radius: 3px;
      color: var(--text);
    }

    /* Chargement */
    .msg.assistant.loading .bubble {
      color: var(--accent);
      font-style: italic;
      font-size: 0.88rem;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.3; } }
    .loading-dots { animation: blink 1.3s ease-in-out infinite; }

    /* Erreur */
    .msg.error .msg-label { color: #b91c1c; }
    .msg.error .bubble {
      background: #fff7f7;
      border-color: #fecaca;
      color: #7f1d1d;
      font-size: 0.85rem;
    }

    /* ── Liens BOI dans le texte ── */
    .boi-link {
      color: var(--accent);
      text-decoration: underline;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: .88em;
      font-weight: 600;
    }
    .boi-link:hover { color: var(--accent-hover); }

    .boi-ignore {
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: .88em;
      color: #999;
    }

    /* ── Encart Sources ── */
    .sources-panel {
      margin-top: 8px;
      padding: 10px 14px;
      background: #f7f7f5;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.81rem;
      width: 100%;
    }
    .encart-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      margin-bottom: 7px;
    }
    /* Item source entièrement cliquable */
    .source-item {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 5px;
      margin-bottom: 6px;
      line-height: 1.4;
      text-decoration: none;
      color: inherit;
      border-radius: 5px;
      padding: 3px 4px;
      margin-left: -4px;
      transition: background 0.12s;
    }
    .source-item:last-child { margin-bottom: 0; }
    .source-item:hover { background: #eef2ef; }
    .source-boi-id {
      color: var(--accent);
      text-decoration: underline;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .source-titre { color: var(--muted); }
    .source-date  { color: #999; font-size: 0.75rem; }

    /* Badges statut */
    .badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    /* Vert : en vigueur */
    .badge-ok     { background: #e6f4ea; color: #1a3a2e; }
    /* Orange #c97a3a : version plus récente disponible */
    .badge-warn   { background: #fdf0e4; color: #c97a3a; }
    /* Rouge discret #b04a4a : rapporté ou abrogé */
    .badge-orange { background: #faeaea; color: #b04a4a; }
    .badge-red    { background: #faeaea; color: #b04a4a; }
    .badge-gray   { background: #f3f4f6; color: #6b7280; }

    /* ── Encart Base légale CGI ── */
    .cgi-panel {
      margin-top: 8px;
      padding: 9px 14px;
      background: #f7f7f5;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.81rem;
      width: 100%;
      color: var(--muted);
    }
    .cgi-panel .encart-label { color: var(--muted); }
    .cgi-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .cgi-item {
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 0.78rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 7px;
      color: var(--text);
    }

    /* ── Zone de saisie ── */
    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      align-items: flex-end;
      background: var(--surface);
    }

    #input {
      flex: 1;
      padding: 10px 14px;
      font-size: 0.93rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 8px;
      resize: none;
      outline: none;
      line-height: 1.5;
      min-height: 42px;
      max-height: 180px;
      overflow-y: auto;
      transition: border-color 0.15s;
      background: var(--surface);
      color: var(--text);
    }
    #input:focus { border-color: var(--accent); }
    #input:disabled { background: var(--bg); cursor: not-allowed; }
    #input::placeholder { color: #9ca3af; }

    /* Bouton principal Envoyer */
    #send-btn {
      padding: 0 20px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #ffffff;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      height: 42px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #send-btn:hover   { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.45; cursor: default; }
  </style>
</head>
<body>
  <div class="app">

    <header>
      <div class="header-title">
        <h1>Chatbot BOFiP</h1>
        <p>Recherche et synthèse de doctrine fiscale</p>
      </div>
      <div class="header-actions">
        <button id="export-btn" class="btn-secondary" type="button" disabled>Exporter</button>
        <button id="new-conv-btn" class="btn-secondary" type="button">Nouvelle conversation</button>
      </div>
    </header>

    <div class="domain-bar" id="domain-bar">
      <span class="label">Domaine&nbsp;:</span>
    </div>

    <div class="conversation" id="conversation">
      <div class="empty-state" id="empty-state">
        <strong>Posez votre question fiscale</strong>
        L'assistant consulte la doctrine BOFiP en temps réel et vous répond<br>
        avec une synthèse sourcée directement.
      </div>
    </div>

    <div class="input-area">
      <textarea
        id="input"
        placeholder="Votre question fiscale… (Entrée pour envoyer, Maj+Entrée pour sauter une ligne)"
        rows="1"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="send-btn" type="button">Envoyer</button>
    </div>

  </div>

  <script>
    const DOMAINES = ["IS", "IR", "TVA", "BIC", "BNC", "RPPM", "ENR", "PAT"];

    // ── État ──────────────────────────────────────────────────────────────
    let messages          = [];
    let panier_boi        = new Set();
    let boi_cites_cumules = new Map();
    let filtre_domaine    = null;
    let isLoading         = false;

    // ── Refs DOM ──────────────────────────────────────────────────────────
    const domainBarEl  = document.getElementById("domain-bar");
    const convEl       = document.getElementById("conversation");
    const emptyStateEl = document.getElementById("empty-state");
    const inputEl      = document.getElementById("input");
    const sendBtn      = document.getElementById("send-btn");
    const newConvBtn   = document.getElementById("new-conv-btn");
    const exportBtn    = document.getElementById("export-btn");

    // ── Puces de domaine ──────────────────────────────────────────────────
    DOMAINES.forEach((dom) => {
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = "chip";
      chip.textContent = dom;
      chip.setAttribute("aria-pressed", "false");
      chip.addEventListener("click", () => {
        const wasActive = filtre_domaine === dom;
        domainBarEl.querySelectorAll(".chip")
          .forEach((c) => c.setAttribute("aria-pressed", "false"));
        filtre_domaine = wasActive ? null : dom;
        if (!wasActive) chip.setAttribute("aria-pressed", "true");
      });
      domainBarEl.appendChild(chip);
    });

    // ── Textarea auto-resize ──────────────────────────────────────────────
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + "px";
    });

    // ── Entrée = envoyer, Maj+Entrée = saut de ligne ──────────────────────
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (!isLoading) sendMessage();
      }
    });
    sendBtn.addEventListener("click", () => { if (!isLoading) sendMessage(); });

    // ── Nouvelle conversation ─────────────────────────────────────────────
    newConvBtn.addEventListener("click", () => {
      messages          = [];
      panier_boi        = new Set();
      boi_cites_cumules = new Map();
      convEl.innerHTML  = "";
      convEl.appendChild(emptyStateEl);
      emptyStateEl.style.display = "";
      inputEl.value        = "";
      inputEl.style.height = "auto";
      exportBtn.disabled   = true;
      inputEl.focus();
    });

    // ── Export ────────────────────────────────────────────────────────────
    exportBtn.addEventListener("click", async () => {
      try {
        const resp = await fetch("/export", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages,
            boi_cites_cumules: [...boi_cites_cumules.values()],
          }),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const html = await resp.text();
        const blob = new Blob([html], { type: "text/html; charset=utf-8" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href     = url;
        a.download = `bofip-consultation-${new Date().toISOString().slice(0, 10)}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (err) {
        appendError(`Erreur lors de l'export : ${err.message}`);
      }
    });

    // ── Utilitaires ───────────────────────────────────────────────────────
    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function scrollToBottom() { convEl.scrollTop = convEl.scrollHeight; }

    // ── Rendu du texte avec liens BOI ─────────────────────────────────────
    function renderTextWithBoi(text, citesMap, ignoresSet) {
      const regex = /\[BOI-[A-Z0-9][A-Z0-9-]*(?:\s+§\s*[\d.]+)?\]/g;
      let html = "";
      let last = 0;
      let m;

      while ((m = regex.exec(text)) !== null) {
        html += escapeHtml(text.slice(last, m.index)).replace(/\n/g, "<br>");

        const full  = m[0];
        const inner = full.slice(1, -1);
        const pm    = inner.match(/^(BOI-[A-Z0-9-]+)\s+§\s*([\d.]+)$/);
        const boiId = pm ? pm[1] : inner.trim();
        const para  = pm ? pm[2] : null;

        if (citesMap && citesMap.has(boiId)) {
          let href = citesMap.get(boiId).url_bofip || "#";
          if (para && href !== "#" && !href.includes("#")) href += "#" + para;
          html += `<a class="boi-link" href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${escapeHtml(inner)}</a>`;
        } else if (ignoresSet && ignoresSet.has(boiId)) {
          html += `<span class="boi-ignore">${escapeHtml(inner)}</span>`;
        } else {
          html += escapeHtml(full);
        }

        last = m.index + full.length;
      }

      html += escapeHtml(text.slice(last)).replace(/\n/g, "<br>");
      return html;
    }

    // ── Badge statut de version ───────────────────────────────────────────
    function badgeStatut(note_version) {
      if (!note_version) return "";
      const m    = note_version.match(/statut "([^"]+)"/);
      const st   = m ? m[1].toLowerCase() : "";
      const plus = note_version.includes("plus récente disponible");

      if (st.includes("vigueur") && !plus) return '<span class="badge badge-ok">En vigueur</span>';
      if (st.includes("vigueur") && plus)  return '<span class="badge badge-warn">Mise à jour</span>';
      if (st.includes("rapport"))          return '<span class="badge badge-orange">Rapporté</span>';
      if (st.includes("abrog"))            return '<span class="badge badge-red">Abrogé</span>';
      return st ? `<span class="badge badge-gray">${escapeHtml(st)}</span>` : "";
    }

    // ── Bulle utilisateur ─────────────────────────────────────────────────
    function appendUserBubble(content) {
      emptyStateEl.style.display = "none";
      const msgDiv = document.createElement("div");
      msgDiv.className = "msg user";
      const label = document.createElement("div");
      label.className = "msg-label";
      label.textContent = "Vous";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = content;
      msgDiv.appendChild(label);
      msgDiv.appendChild(bubble);
      convEl.appendChild(msgDiv);
      scrollToBottom();
    }

    // ── Bulle assistant ───────────────────────────────────────────────────
    function appendAssistantBubble(content, meta = {}) {
      emptyStateEl.style.display = "none";
      const { boi_cites = [], boi_ignores = [], articles_cgi = [] } = meta;

      const citesMap   = new Map(boi_cites.map((b) => [b.boi_id, b]));
      const ignoresSet = new Set(boi_ignores.map((b) => b.boi_id));
      const hasMeta    = boi_cites.length > 0 || boi_ignores.length > 0;

      const msgDiv = document.createElement("div");
      msgDiv.className = "msg assistant";

      const label = document.createElement("div");
      label.className = "msg-label";
      label.textContent = "Assistant";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = hasMeta
        ? renderTextWithBoi(content, citesMap, ignoresSet)
        : escapeHtml(content).replace(/\n/g, "<br>");

      msgDiv.appendChild(label);
      msgDiv.appendChild(bubble);

      // Encart Sources citées
      if (boi_cites.length) {
        const panel = document.createElement("div");
        panel.className = "sources-panel";
        const lbl = document.createElement("div");
        lbl.className = "encart-label";
        lbl.textContent = "Sources citées";
        panel.appendChild(lbl);

        boi_cites.forEach((b) => {
          // Item entier = lien cliquable vers url_bofip
          const item = document.createElement("a");
          item.className = "source-item";
          item.href   = b.url_bofip || "#";
          item.target = "_blank";
          item.rel    = "noopener noreferrer";

          const idSpan = document.createElement("span");
          idSpan.className = "source-boi-id";
          idSpan.textContent = b.boi_id || "";
          item.appendChild(idSpan);

          if (b.paragraphe) {
            const p = document.createElement("span");
            p.className = "source-titre";
            p.textContent = " " + b.paragraphe;
            item.appendChild(p);
          }
          if (b.titre) {
            const t = document.createElement("span");
            t.className = "source-titre";
            t.textContent = " — " + b.titre;
            item.appendChild(t);
          }
          if (b.date_publication) {
            const d = document.createElement("span");
            d.className = "source-date";
            d.textContent = " (" + b.date_publication + ")";
            item.appendChild(d);
          }
          if (b.note_version) {
            const badge = document.createElement("span");
            badge.innerHTML = " " + badgeStatut(b.note_version);
            item.appendChild(badge);
          }
          panel.appendChild(item);
        });
        msgDiv.appendChild(panel);
      }

      // Encart Base légale CGI
      if (articles_cgi.length) {
        const cgiPanel = document.createElement("div");
        cgiPanel.className = "cgi-panel";
        const cgiLbl = document.createElement("div");
        cgiLbl.className = "encart-label";
        cgiLbl.textContent = "Base légale référencée (CGI)";
        cgiPanel.appendChild(cgiLbl);
        const list = document.createElement("div");
        list.className = "cgi-list";
        articles_cgi.forEach((art) => {
          const span = document.createElement("span");
          span.className = "cgi-item";
          span.textContent = "Art. " + art + " CGI";
          list.appendChild(span);
        });
        cgiPanel.appendChild(list);
        msgDiv.appendChild(cgiPanel);
      }

      convEl.appendChild(msgDiv);
      scrollToBottom();
    }

    // ── Message d'erreur discret ──────────────────────────────────────────
    function appendError(message) {
      emptyStateEl.style.display = "none";
      const msgDiv = document.createElement("div");
      msgDiv.className = "msg assistant error";
      const label = document.createElement("div");
      label.className = "msg-label";
      label.textContent = "Erreur";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = message;
      msgDiv.appendChild(label);
      msgDiv.appendChild(bubble);
      convEl.appendChild(msgDiv);
      scrollToBottom();
    }

    // ── Indicateur de chargement ──────────────────────────────────────────
    let loadingEl = null;

    function showLoading() {
      loadingEl = document.createElement("div");
      loadingEl.className = "msg assistant loading";
      const label = document.createElement("div");
      label.className = "msg-label";
      label.textContent = "Assistant";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      const dots = document.createElement("span");
      dots.className = "loading-dots";
      dots.textContent = "Recherche dans le BOFiP…";
      bubble.appendChild(dots);
      loadingEl.appendChild(label);
      loadingEl.appendChild(bubble);
      convEl.appendChild(loadingEl);
      scrollToBottom();
    }

    function hideLoading() {
      if (loadingEl) { loadingEl.remove(); loadingEl = null; }
    }

    // ── Envoi ─────────────────────────────────────────────────────────────
    async function sendMessage() {
      const content = inputEl.value.trim();
      if (!content) return;

      messages.push({ role: "user", content });
      appendUserBubble(content);
      inputEl.value = "";
      inputEl.style.height = "auto";

      isLoading = true;
      sendBtn.disabled = true;
      inputEl.disabled = true;
      showLoading();

      try {
        const resp = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages,
            paniers_boi: [...panier_boi],
            filtre_domaine,
          }),
        });

        const data = await resp.json();
        hideLoading();

        if (!resp.ok || data.error) throw new Error(data.error || `HTTP ${resp.status}`);

        const reponse = data.reponse || "";

        // Mise à jour du panier et des sources cumulées
        if (Array.isArray(data.boi_cites)) {
          data.boi_cites.forEach((b) => {
            if (b.boi_id) {
              panier_boi.add(b.boi_id);
              if (!boi_cites_cumules.has(b.boi_id)) boi_cites_cumules.set(b.boi_id, b);
            }
          });
          if (data.boi_cites.length) exportBtn.disabled = false;
        }

        messages.push({ role: "assistant", content: reponse });

        appendAssistantBubble(reponse, {
          boi_cites:    data.boi_cites    || [],
          boi_ignores:  data.boi_ignores  || [],
          articles_cgi: data.articles_cgi || [],
        });

      } catch (err) {
        hideLoading();
        messages.pop();
        appendError(`Une erreur est survenue : ${err.message}`);
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
